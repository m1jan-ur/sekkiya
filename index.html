<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>한글 1000 · Korean Vocabulary</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0a0b0e;--surface:#111318;--surface2:#181b23;--surface3:#1f2330;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --accent:#e8b96a;--accent-dim:rgba(232,185,106,0.12);
  --teal:#6ec6d4;--teal-dim:rgba(110,198,212,0.12);
  --green:#6adba0;--red:#e87272;
  --text:#eceef4;--muted:#636878;--subtle:#3a3f50;
  --r:12px;--r-sm:7px;--r-pill:999px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 900px 600px at 70% 0%,rgba(232,185,106,0.04) 0%,transparent 70%),
             radial-gradient(ellipse 600px 400px at 0% 80%,rgba(110,198,212,0.03) 0%,transparent 70%);
  pointer-events:none;z-index:0}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:var(--subtle);border-radius:3px}

/* ── HEADER ── */
header{position:relative;z-index:10;max-width:1300px;margin:0 auto;
  padding:2.2rem 2rem 0;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:1rem}
.logo h1{font-family:'Noto Serif KR',serif;font-size:clamp(2rem,4vw,3.2rem);
  font-weight:300;letter-spacing:-0.01em;color:#f5f0e8;line-height:1}
.logo p{font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);margin-top:.3rem}
.badge{background:var(--surface);border:1px solid var(--border);padding:.4rem .9rem;
  border-radius:var(--r-pill);font-family:'DM Mono',monospace;font-size:.72rem;color:var(--muted)}
.badge span{color:var(--accent)}

/* ── TABS ── */
.tabs{position:relative;z-index:10;max-width:1300px;margin:1.8rem auto 0;
  padding:0 2rem;display:flex;gap:.45rem}
.tab{background:none;border:1px solid var(--border);color:var(--muted);
  padding:.6rem 1.3rem;border-radius:var(--r-sm);font-family:'DM Sans',sans-serif;
  font-size:.83rem;font-weight:500;cursor:pointer;transition:all .18s;
  display:flex;align-items:center;gap:.45rem}
.tab svg{width:15px;height:15px;flex-shrink:0}
.tab:hover{color:var(--text);border-color:var(--border2)}
.tab.active{background:var(--accent);border-color:var(--accent);color:#0a0b0e}

/* ── MAIN ── */
main{position:relative;z-index:10;max-width:1300px;margin:0 auto;padding:1.8rem 2rem 6rem}
.panel{display:none}.panel.active{display:block}

/* ══════════════════════════════════════
   AUDIOBOOK
══════════════════════════════════════ */
.ab-grid{display:grid;grid-template-rows:auto auto auto;gap:1.2rem}

/* Now Playing */
.now-playing{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:2rem 2.2rem;display:grid;grid-template-columns:1fr 120px;gap:1.5rem;align-items:center;
  position:relative;overflow:hidden;min-height:180px}
.now-playing::after{content:'';position:absolute;right:-40px;top:-40px;
  width:200px;height:200px;border-radius:50%;
  background:radial-gradient(circle,rgba(232,185,106,0.06) 0%,transparent 70%);pointer-events:none}
.np-num{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--accent);
  letter-spacing:.1em;text-transform:uppercase;margin-bottom:.5rem}
#np-korean{font-family:'Noto Serif KR',serif;font-size:clamp(1.8rem,4vw,3rem);
  font-weight:300;color:#f5f0e8;line-height:1.1;margin-bottom:.25rem}
#np-roman{font-family:'DM Mono',monospace;font-size:.85rem;color:var(--teal);margin-bottom:.5rem}
#np-eng{font-size:.95rem;font-weight:500;color:var(--text);margin-bottom:.9rem}
#np-sent-kr{font-family:'Noto Serif KR',serif;font-size:.9rem;color:var(--muted);font-weight:300;margin-bottom:.2rem}
#np-sent-en{font-size:.8rem;color:var(--muted);font-style:italic}

/* Ring */
.ring-wrap{position:relative;width:110px;height:110px;flex-shrink:0}
.ring-wrap svg{width:110px;height:110px;transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--surface3);stroke-width:5}
.ring-arc{fill:none;stroke:var(--accent);stroke-width:5;stroke-linecap:round;
  stroke-dasharray:283;stroke-dashoffset:283;transition:stroke-dashoffset .5s ease}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-cur{font-family:'DM Mono',monospace;font-size:1.25rem;color:var(--accent);line-height:1}
.ring-sep{font-size:.55rem;color:var(--subtle);margin:.1rem 0}
.ring-tot{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--muted)}

/* Controls bar */
.ctrl-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.4rem 1.8rem;display:flex;flex-direction:column;gap:1.1rem}
.prog-row{display:flex;align-items:center;gap:.9rem}
.t-lbl{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--muted);min-width:2.5ch}
.track{flex:1;height:3px;background:var(--surface3);border-radius:var(--r-pill);cursor:pointer;position:relative}
.track-fill{height:100%;background:var(--accent);border-radius:var(--r-pill);width:0%;transition:width .3s ease;pointer-events:none}

.btn-row{display:flex;align-items:center;justify-content:center;gap:.8rem}
.cbtn{background:none;border:1px solid var(--border);color:var(--text);
  width:40px;height:40px;border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .17s;font-size:.9rem}
.cbtn:hover{border-color:var(--accent);color:var(--accent)}
.cbtn:disabled{opacity:.25;cursor:not-allowed}
.cbtn.play{width:52px;height:52px;background:var(--accent);border-color:var(--accent);color:#0a0b0e;font-size:1.1rem}
.cbtn.play:hover{background:#f2ca80;border-color:#f2ca80}

.ab-bottom{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.8rem}
.speed-grp{display:flex;align-items:center;gap:.5rem}
.speed-lbl{font-size:.72rem;color:var(--muted);font-family:'DM Mono',monospace}
.spd{background:none;border:1px solid var(--border);color:var(--muted);
  padding:.22rem .5rem;border-radius:4px;font-family:'DM Mono',monospace;font-size:.7rem;cursor:pointer;transition:all .15s}
.spd.on{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.spd:hover{color:var(--text)}

.lang-grp{display:flex;align-items:center;gap:.8rem;font-size:.75rem;color:var(--muted)}
.lang-grp label{display:flex;align-items:center;gap:.35rem;cursor:pointer;transition:color .15s}
.lang-grp label:has(input:checked){color:var(--accent)}
.lang-grp input{accent-color:var(--accent);width:13px;height:13px;cursor:pointer}

.status{font-family:'DM Mono',monospace;font-size:.68rem;padding:.22rem .65rem;
  border-radius:var(--r-pill);background:var(--surface3);color:var(--muted);letter-spacing:.04em}
.status.playing{background:rgba(106,219,160,0.12);color:var(--green)}
.status.paused{background:var(--accent-dim);color:var(--accent)}

/* Mini queue */
.queue-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.queue-hdr{padding:.9rem 1.4rem;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border)}
.queue-hdr h3{font-size:.8rem;font-weight:500;letter-spacing:.05em;text-transform:uppercase;color:var(--muted)}
.queue-list{height:220px;overflow-y:auto;padding:.5rem 0}
.q-item{padding:.55rem 1.4rem;display:grid;grid-template-columns:2.5rem 1fr auto;gap:.7rem;
  align-items:center;cursor:pointer;transition:background .15s;border-radius:0}
.q-item:hover{background:var(--surface2)}
.q-item.active{background:var(--accent-dim)}
.q-item.active .q-num{color:var(--accent)}
.q-num{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--subtle);text-align:right}
.q-kr{font-family:'Noto Serif KR',serif;font-size:.9rem;color:var(--text);font-weight:300}
.q-en{font-size:.72rem;color:var(--muted)}

/* ══════════════════════════════════════
   STUDY CARDS
══════════════════════════════════════ */
.study-top{display:flex;align-items:center;gap:.8rem;margin-bottom:1.4rem;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:220px}
.search-wrap svg{position:absolute;left:.85rem;top:50%;transform:translateY(-50%);
  width:15px;height:15px;color:var(--muted);pointer-events:none}
#search{width:100%;background:var(--surface);border:1px solid var(--border);
  color:var(--text);padding:.65rem 1rem .65rem 2.4rem;border-radius:var(--r-sm);
  font-family:'DM Sans',sans-serif;font-size:.85rem;outline:none;transition:border-color .2s}
#search::placeholder{color:var(--muted)}
#search:focus{border-color:var(--border2)}
.count-lbl{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--muted);white-space:nowrap}
.count-lbl span{color:var(--accent)}

.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:1.3rem 1.4rem;transition:border-color .2s,transform .18s;position:relative;overflow:hidden}
.card:hover{border-color:var(--border2);transform:translateY(-2px)}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
  opacity:0;transition:opacity .2s}
.card:hover::before{opacity:.6}
.card-num{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--subtle);margin-bottom:.5rem}
.card-kr{font-family:'Noto Serif KR',serif;font-size:1.5rem;font-weight:300;
  color:#f5f0e8;margin-bottom:.2rem;line-height:1.2}
.card-roman{font-family:'DM Mono',monospace;font-size:.75rem;color:var(--teal);margin-bottom:.35rem}
.card-eng{font-size:.88rem;font-weight:500;color:var(--text);margin-bottom:.9rem}
.card-divider{height:1px;background:var(--border);margin-bottom:.8rem}
.card-sent-kr{font-family:'Noto Serif KR',serif;font-size:.82rem;color:var(--muted);font-weight:300;margin-bottom:.2rem;line-height:1.5}
.card-sent-en{font-size:.75rem;color:var(--subtle);font-style:italic;line-height:1.5;margin-bottom:.9rem}
.card-btns{display:flex;gap:.5rem}
.card-btn{background:none;border:1px solid var(--border);color:var(--muted);
  padding:.35rem .75rem;border-radius:var(--r-sm);font-size:.72rem;cursor:pointer;
  display:flex;align-items:center;gap:.35rem;transition:all .15s;font-family:'DM Sans',sans-serif}
.card-btn:hover{border-color:var(--accent);color:var(--accent)}
.card-btn.speaking{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.card-btn svg{width:12px;height:12px}

/* No results */
.no-results{grid-column:1/-1;text-align:center;padding:3rem;color:var(--muted);font-size:.9rem}

/* Responsive */
@media(max-width:700px){
  .now-playing{grid-template-columns:1fr}
  .ring-wrap{display:none}
  .cards-grid{grid-template-columns:1fr}
  header,main,.tabs{padding-left:1rem;padding-right:1rem}
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <h1>한글</h1>
    <p>1000 Korean Words</p>
  </div>
  <div class="badge"><span id="total-count">1000</span> words · Web Speech Audio</div>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchTab('audiobook',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="10,8 16,12 10,16"/></svg>
    Audiobook
  </button>
  <button class="tab" onclick="switchTab('study',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    Study Cards
  </button>
</div>

<main>
<!-- ═══ AUDIOBOOK PANEL ═══ -->
<div id="panel-audiobook" class="panel active">
  <div class="ab-grid">

    <div class="now-playing">
      <div>
        <div class="np-num" id="np-num">Word 1 of 1000</div>
        <div id="np-korean">가게</div>
        <div id="np-roman">gage</div>
        <div id="np-eng">shop</div>
        <div id="np-sent-kr">가게에 가요.</div>
        <div id="np-sent-en">I go to the shop.</div>
      </div>
      <div class="ring-wrap">
        <svg viewBox="0 0 100 100"><circle class="ring-bg" cx="50" cy="50" r="45"/><circle class="ring-arc" id="ring-arc" cx="50" cy="50" r="45"/></svg>
        <div class="ring-center">
          <div class="ring-cur" id="ring-cur">1</div>
          <div class="ring-sep">of</div>
          <div class="ring-tot">1000</div>
        </div>
      </div>
    </div>

    <div class="ctrl-bar">
      <div class="prog-row">
        <span class="t-lbl" id="t-cur">1</span>
        <div class="track" id="track" onclick="seekTo(event)">
          <div class="track-fill" id="track-fill"></div>
        </div>
        <span class="t-lbl" id="t-tot">1000</span>
      </div>
      <div class="btn-row">
        <button class="cbtn" id="btn-prev" onclick="prevWord()" title="Previous">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="19,20 9,12 19,4"/><line x1="5" y1="4" x2="5" y2="20"/></svg>
        </button>
        <button class="cbtn" onclick="skipWords(-10)" title="-10">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1,4 1,10 7,10"/><path d="M3.51 15a9 9 0 1 0 .49-3.54"/><text x="8" y="15" font-size="6" fill="currentColor" stroke="none" style="font-family:sans-serif">10</text></svg>
        </button>
        <button class="cbtn play" id="btn-play" onclick="togglePlay()">
          <svg id="play-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
        </button>
        <button class="cbtn" onclick="skipWords(10)" title="+10">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23,4 23,10 17,10"/><path d="M20.49 15a9 9 0 1 1-.49-3.54"/></svg>
        </button>
        <button class="cbtn" id="btn-next" onclick="nextWord()" title="Next">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5,4 15,12 5,20"/><line x1="19" y1="4" x2="19" y2="20"/></svg>
        </button>
      </div>
      <div class="ab-bottom">
        <div class="speed-grp">
          <span class="speed-lbl">Speed</span>
          <button class="spd" onclick="setSpeed(0.7,this)">0.7×</button>
          <button class="spd on" onclick="setSpeed(1,this)">1×</button>
          <button class="spd" onclick="setSpeed(1.3,this)">1.3×</button>
          <button class="spd" onclick="setSpeed(1.6,this)">1.6×</button>
        </div>
        <div class="lang-grp">
          <label><input type="checkbox" id="chk-roman" checked/><span>Romanization</span></label>
          <label><input type="checkbox" id="chk-sent" checked/><span>Sentences</span></label>
        </div>
        <div class="status" id="ab-status">Ready</div>
      </div>
    </div>

    <div class="queue-wrap">
      <div class="queue-hdr">
        <h3>Queue</h3>
        <span class="badge" style="font-size:.65rem">Scroll to current</span>
      </div>
      <div class="queue-list" id="queue-list"></div>
    </div>

  </div>
</div>

<!-- ═══ STUDY PANEL ═══ -->
<div id="panel-study" class="panel">
  <div class="study-top">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search" placeholder="Search by Korean, English or romanization…" oninput="filterCards()"/>
    </div>
    <div class="count-lbl">Showing <span id="shown-count">1000</span> words</div>
  </div>
  <div class="cards-grid" id="cards-grid"></div>
</div>
</main>

<script>
// ═══════════════════════════════════════════════════════
// DATA — all 1000 entries
// format: [num, korean, romanization, english, sent_kr, sent_roman, sent_en]
// ═══════════════════════════════════════════════════════
const DATA = [

// STATE
// ═══════════════════════════════════════════════════════
let curIdx = 0;
let playing = false;
let speed = 1;
let cardSpeaking = null;
let abUtter = null;

const synth = window.speechSynthesis;

// ═══════════════════════════════════════════════════════
// TAB SWITCHING
// ═══════════════════════════════════════════════════════
function switchTab(id, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-' + id).classList.add('active');
  btn.classList.add('active');
}

// ═══════════════════════════════════════════════════════
// AUDIOBOOK
// ═══════════════════════════════════════════════════════
function updateNowPlaying(idx) {
  const d = DATA[idx];
  document.getElementById('np-num').textContent = `Word ${d[0]} of 1000`;
  document.getElementById('np-korean').textContent = d[1];
  document.getElementById('np-roman').textContent = d[2];
  document.getElementById('np-eng').textContent = d[3];
  document.getElementById('np-sent-kr').textContent = d[4];
  document.getElementById('np-sent-en').textContent = d[6];
  document.getElementById('ring-cur').textContent = d[0];
  document.getElementById('t-cur').textContent = d[0];
  // Ring arc
  const pct = d[0] / 1000;
  const offset = 283 - (pct * 283);
  document.getElementById('ring-arc').style.strokeDashoffset = offset;
  // Progress bar
  document.getElementById('track-fill').style.width = (pct * 100) + '%';
  // Queue highlight
  document.querySelectorAll('.q-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
  // Scroll queue item into view
  const qi = document.querySelector('.q-item.active');
  if (qi) qi.scrollIntoView({block:'nearest', behavior:'smooth'});
}

function buildQueue() {
  const list = document.getElementById('queue-list');
  list.innerHTML = DATA.map((d, i) =>
    `<div class="q-item${i===0?' active':''}" onclick="jumpTo(${i})">
      <span class="q-num">${d[0]}</span>
      <span class="q-kr">${d[1]}</span>
      <span class="q-en">${d[3]}</span>
    </div>`
  ).join('');
}

function jumpTo(idx) {
  stopAB();
  curIdx = idx;
  updateNowPlaying(idx);
}

function seekTo(e) {
  const rect = e.currentTarget.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  jumpTo(Math.floor(pct * 1000));
}

function speakWord(idx, onDone) {
  if (!synth) return onDone && onDone();
  synth.cancel();
  const d = DATA[idx];
  const includeSent = document.getElementById('chk-sent').checked;
  const includeRoman = document.getElementById('chk-roman').checked;

  const parts = [];
  // Korean word
  const u1 = new SpeechSynthesisUtterance(d[1]);
  u1.lang = 'ko-KR'; u1.rate = speed * 0.9;
  parts.push(u1);
  // Romanization (English voice)
  if (includeRoman) {
    const u2 = new SpeechSynthesisUtterance(d[2]);
    u2.lang = 'en-US'; u2.rate = speed;
    parts.push(u2);
  }
  // English meaning
  const u3 = new SpeechSynthesisUtterance(d[3]);
  u3.lang = 'en-US'; u3.rate = speed;
  parts.push(u3);
  // Korean sentence
  if (includeSent) {
    const u4 = new SpeechSynthesisUtterance(d[4]);
    u4.lang = 'ko-KR'; u4.rate = speed * 0.85;
    parts.push(u4);
    // English sentence
    const u5 = new SpeechSynthesisUtterance(d[6]);
    u5.lang = 'en-US'; u5.rate = speed;
    parts.push(u5);
  }

  // Chain utterances
  for (let i = 0; i < parts.length - 1; i++) {
    const next = parts[i + 1];
    parts[i].onend = () => synth.speak(next);
  }
  parts[parts.length - 1].onend = onDone || null;

  abUtter = parts[0];
  synth.speak(parts[0]);
}

function playNext() {
  if (!playing) return;
  if (curIdx >= DATA.length - 1) {
    stopAB();
    setStatus('Done');
    return;
  }
  curIdx++;
  updateNowPlaying(curIdx);
  speakWord(curIdx, playNext);
}

function togglePlay() {
  if (playing) {
    stopAB();
  } else {
    startAB();
  }
}

function startAB() {
  playing = true;
  setPlayIcon(true);
  setStatus('playing', 'Playing');
  speakWord(curIdx, playNext);
}

function stopAB() {
  playing = false;
  synth.cancel();
  setPlayIcon(false);
  setStatus('', 'Paused');
}

function prevWord() { stopAB(); if (curIdx > 0) { curIdx--; updateNowPlaying(curIdx); } }
function nextWord() { stopAB(); if (curIdx < 999) { curIdx++; updateNowPlaying(curIdx); } }
function skipWords(n) { stopAB(); curIdx = Math.max(0, Math.min(999, curIdx + n)); updateNowPlaying(curIdx); }

function setSpeed(s, btn) {
  speed = s;
  document.querySelectorAll('.spd').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
}

function setPlayIcon(isPlaying) {
  const icon = document.getElementById('play-icon');
  if (isPlaying) {
    icon.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
  } else {
    icon.innerHTML = '<polygon points="5,3 19,12 5,21"/>';
  }
}

function setStatus(cls, text) {
  const el = document.getElementById('ab-status');
  el.className = 'status ' + cls;
  el.textContent = text || 'Ready';
}

// ═══════════════════════════════════════════════════════
// STUDY CARDS
// ═══════════════════════════════════════════════════════
function buildCards(filtered) {
  const grid = document.getElementById('cards-grid');
  const items = filtered || DATA;
  if (items.length === 0) {
    grid.innerHTML = '<div class="no-results">No words found. Try a different search.</div>';
    return;
  }
  grid.innerHTML = items.map(d => `
    <div class="card">
      <div class="card-num">#${d[0]}</div>
      <div class="card-kr">${d[1]}</div>
      <div class="card-roman">${d[2]}</div>
      <div class="card-eng">${d[3]}</div>
      <div class="card-divider"></div>
      <div class="card-sent-kr">${d[4]}</div>
      <div class="card-sent-en">${d[6]}</div>
      <div class="card-btns">
        <button class="card-btn" id="btn-w-${d[0]}" onclick="speakCard(${d[0]-1},'word')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
          Word
        </button>
        <button class="card-btn" id="btn-s-${d[0]}" onclick="speakCard(${d[0]-1},'sentence')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
          Sentence
        </button>
      </div>
    </div>
  `).join('');
  document.getElementById('shown-count').textContent = items.length;
}

function speakCard(idx, mode) {
  synth.cancel();
  const d = DATA[idx];
  const num = d[0];
  // Reset previous
  if (cardSpeaking) {
    const prev = document.getElementById('btn-w-' + cardSpeaking);
    const prevS = document.getElementById('btn-s-' + cardSpeaking);
    if (prev) prev.classList.remove('speaking');
    if (prevS) prevS.classList.remove('speaking');
  }
  cardSpeaking = num;
  const btnId = mode === 'word' ? 'btn-w-' + num : 'btn-s-' + num;
  const btn = document.getElementById(btnId);
  if (btn) btn.classList.add('speaking');

  const parts = [];
  if (mode === 'word') {
    const u1 = new SpeechSynthesisUtterance(d[1]);
    u1.lang = 'ko-KR'; u1.rate = 0.85;
    const u2 = new SpeechSynthesisUtterance(d[3]);
    u2.lang = 'en-US'; u2.rate = 0.95;
    parts.push(u1, u2);
  } else {
    const u1 = new SpeechSynthesisUtterance(d[4]);
    u1.lang = 'ko-KR'; u1.rate = 0.82;
    const u2 = new SpeechSynthesisUtterance(d[6]);
    u2.lang = 'en-US'; u2.rate = 0.95;
    parts.push(u1, u2);
  }
  for (let i = 0; i < parts.length - 1; i++) {
    parts[i].onend = () => synth.speak(parts[i+1]);
  }
  parts[parts.length-1].onend = () => {
    if (btn) btn.classList.remove('speaking');
    cardSpeaking = null;
  };
  synth.speak(parts[0]);
}

function filterCards() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  if (!q) { buildCards(); return; }
  const filtered = DATA.filter(d =>
    d[1].includes(q) ||
    d[2].toLowerCase().includes(q) ||
    d[3].toLowerCase().includes(q) ||
    d[4].includes(q) ||
    d[6].toLowerCase().includes(q)
  );
  buildCards(filtered);
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
buildQueue();
buildCards();
updateNowPlaying(0);
</script>
